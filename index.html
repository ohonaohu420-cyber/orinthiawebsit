<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
    <title>Ohuu Interactive Website</title>
    <style>
        body {
            background-color: #fce4ec;
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 50px;
            transition: background-color 0.5s;
        }

        h1 {
            color: #e91e63;
            transition: color 0.5s;
        }

        h1:hover {
            color: #ff4081;
        }

        p {
            color: #4a148c;
            font-size: 20px;
        }

        button {
            background-color: #e91e63;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            transition: background-color 0.3s, transform 0.3s;
        }

        button:hover {
            background-color: #ff4081;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1>Hello Ohuu 😍</h1>
    <p>Eta amar interactive website!</p>
    <button id="myButton">Change Background 💖</button>

    <script>
        const colors = ["#fce4ec", "#f3e5f5", "#e1bee7", "#f8bbd0", "#f48fb1"];
        let i = 0;

        document.getElementById("myButton").onclick = function() {
            document.body.style.backgroundColor = colors[i];
            i++;
            if(i >= colors.length) i = 0;
        }
    </script>

</body>
</html>
